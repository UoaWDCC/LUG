services:
  db:
    image: postgres:18
    container_name: lug-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: lug_dev
      POSTGRES_USER: lug_user
      POSTGRES_PASSWORD: lug_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
